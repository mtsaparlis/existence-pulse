<!DOCTYPE html>
<html>
<head>
    <title>Michaelangelo Nicholas Tsaparlis - Daily Pulse</title>

    <meta name="description" content="A public daily pulse showing that Michaelangelo Nicholas Tsaparlis checked in today.">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .content {
            text-align: center;
            font-size: 20px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="content">
        Michaelangelo Nicholas Tsaparlis
        <br><br>
        Pulsed today: <span id="date"></span>
    </div>

    <script>
        const today = new Date();

        document.getElementById("date").textContent =
            today.toLocaleDateString("en-US", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
    </script>

</body>
</html>
