<!DOCTYPE html>
<html>
<head>
<title>Daily Pulse</title>
</head>

<body>
<h1>Michaelangelo Nicholas Tsaparlis</h1>

<p>
Pulsed today:
<span id="date"></span>
</p>

<script>
const today = new Date();

document.getElementById("date").textContent =
today.toLocaleDateString("en-US", {
  year: "numeric",
  month: "long",
  day: "numeric"
});
</script>

</body>
</html>
